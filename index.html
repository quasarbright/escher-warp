<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Escher Warp — the Droste effect</title>
<style>
  :root { --bg:#11131a; --panel:#1b1f2b; --ink:#e8e9ee; --muted:#9aa0b0; --accent:#7aa2f7; }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--ink);
    font:14px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    display:flex; flex-wrap:wrap; gap:24px; padding:24px; align-items:flex-start;
  }
  h1 { font-size:20px; margin:0 0 4px; }
  .sub { color:var(--muted); margin:0 0 16px; max-width:46ch; }
  .sub code { color:var(--accent); }
  .stage { display:flex; gap:20px; flex-wrap:wrap; }
  figure { margin:0; }
  figcaption { color:var(--muted); margin-top:8px; font-size:12px; text-align:center; }
  .srcwrap { position:relative; width:450px; height:450px; }
  canvas, .srcimg {
    background:#000; border-radius:10px; display:block;
    box-shadow:0 8px 30px rgba(0,0,0,.4);
    width:450px; height:450px; image-rendering:auto;
  }
  #ov { position:absolute; inset:0; box-shadow:none; background:transparent; cursor:default; }
  .panel {
    background:var(--panel); border-radius:14px; padding:18px 20px;
    min-width:300px; max-width:340px;
  }
  label { margin:14px 0 4px; color:var(--muted); font-size:12px;
          display:flex; justify-content:space-between; }
  label span { color:var(--ink); font-variant-numeric:tabular-nums; }
  input[type=range] { width:100%; accent-color:var(--accent); }
  .row { display:flex; gap:10px; align-items:center; margin-top:14px; }
  button {
    background:var(--accent); color:#0b1020; border:0; border-radius:8px;
    padding:8px 14px; font-weight:600; cursor:pointer; font-size:13px;
  }
  button.ghost { background:#2a3042; color:var(--ink); }
  button.ghost.active { background:var(--accent); color:#0b1020; box-shadow:0 0 0 2px rgba(122,162,247,.4); }
  .chk { display:flex; gap:8px; align-items:center; margin-top:14px; color:var(--ink); }
  .formula { margin-top:18px; padding:12px; background:#0e1017; border-radius:8px;
             color:var(--muted); font-size:12px; }
  .formula code { color:var(--accent); }
  input[type=file] { font-size:12px; color:var(--muted); margin-top:6px; }
  select { width:100%;padding:6px;border-radius:8px;background:#0e1017;color:var(--ink);border:1px solid #2a3042; }
</style>
</head>
<body>
  <div>
    <h1>Escher Warp</h1>
    <p class="sub">
      The conformal "Droste" map behind Escher's <em>Print Gallery</em>
      (de&nbsp;Smit&nbsp;&amp;&nbsp;Lenstra). Drag the rectangle to mark the
      <strong>shrunk copy</strong> of the picture inside itself; that defines the
      self-similarity factor <code>q</code> and its fixed point <code>F</code>, and
      the twist is <code>output(z) = input(z<sup>&alpha;</sup>)</code>,
      <code>&alpha; = 1 &minus; i&middot;ln&nbsp;q/2&pi;</code>.
    </p>
    <div class="stage">
      <figure>
        <div class="srcwrap">
          <img id="src" class="srcimg" src="assets/selfsimilar.png" crossorigin="anonymous" alt="straight">
          <canvas id="ov" width="450" height="450"></canvas>
        </div>
        <figcaption>input — drag the self-similarity rectangle</figcaption>
      </figure>
      <figure>
        <canvas id="out" width="450" height="450"></canvas>
        <figcaption>output — Escher twist</figcaption>
      </figure>
    </div>
  </div>

  <div class="panel">
    <div class="chk"><input type="checkbox" id="twist" checked><label style="margin:0" for="twist">apply twist (off = plain Droste zoom)</label></div>
    <div class="chk"><input type="checkbox" id="centerout"><label style="margin:0" for="centerout">center the output spiral</label></div>

    <label>view zoom (full loop end-to-end) <span id="vzoomV"></span></label>
    <input type="range" id="vzoom" min="0" max="1" step="any" value="0">

    <label>zoom speed <span id="speedV"></span></label>
    <input type="range" id="speed" min="0.02" max="2" step="0.01" value="0.16">

    <div class="row">
      <button class="ghost" id="zin">⊕ Zoom in</button>
      <button class="ghost" id="zout">⊖ Zoom out</button>
    </div>
    <div class="row">
      <button class="ghost" id="reset">Reset rectangle</button>
      <button class="ghost" id="save">Save PNG</button>
    </div>
    <label style="margin-top:14px;display:block">upload your own straight (self-similar) image</label>
    <input type="file" id="upload" accept="image/*">

    <div class="formula" id="fx"></div>
  </div>

<script>
const $ = id => document.getElementById(id);
const out = $('out');
const ov = $('ov'), ovx = ov.getContext('2d');
const N = 450;
out.width = out.height = N;
// slider bounds are constant; the slider spans exactly one seamless loop, so its
// two ends always look identical no matter how q changes from square edits.
const VMIN = +$('vzoom').min, VMAX = +$('vzoom').max;
const srcImg = $('src');

// ---- WebGL: the Droste map runs per-pixel in a fragment shader, with NxN
// supersampling for anti-aliasing (mipmaps would seam at the mod-q fold). ----
const gl = out.getContext('webgl', {antialias:true, preserveDrawingBuffer:true});
const VS = `attribute vec2 pos; void main(){ gl_Position=vec4(pos,0.0,1.0); }`;
const FS = `precision highp float;
uniform sampler2D tex; uniform vec2 uRes,F,O;
uniform float aRe,aIm,mRe,mIm,lnq,ssN;
vec2 cmul(vec2 a,vec2 b){ return vec2(a.x*b.x-a.y*b.y, a.x*b.y+a.y*b.x); }
vec3 one(vec2 frag){
  vec2 z = vec2(frag.x/uRes.x*2.0-1.0, frag.y/uRes.y*2.0-1.0) - O;
  z = cmul(z, vec2(mRe,mIm));               // zoom flow (scale + rotation)
  float r = length(z); vec2 p;
  if(r==0.0){ p=F; } else {
    float lr=log(r), th=atan(z.y,z.x);
    float wr=aRe*lr-aIm*th, wi=aIm*lr+aRe*th;   // w' = alpha*(lr + i*th)
    float em=exp(wr);
    p = F + vec2(em*cos(wi), em*sin(wi));        // p = F + exp(w')
  }
  vec2 u = p-F;                              // fold about F into ring [1/q,1)
  float gx = u.x>=0.0 ? u.x/max(1e-4,1.0-F.x) : (-u.x)/max(1e-4,1.0+F.x);
  float gy = u.y>=0.0 ? u.y/max(1e-4,1.0-F.y) : (-u.y)/max(1e-4,1.0+F.y);
  float g = max(gx,gy);
  if(g>0.0){ float k=floor(log(g)/lnq)+1.0; p = F + u*exp(-k*lnq); }
  return texture2D(tex, (p+1.0)*0.5).rgb;
}
void main(){
  vec2 frag = vec2(gl_FragCoord.x, uRes.y-gl_FragCoord.y);  // match top-left origin
  vec3 c = vec3(0.0);
  for(float i=0.0;i<4.0;i++){ if(i>=ssN) break;
    for(float j=0.0;j<4.0;j++){ if(j>=ssN) break;
      c += one(frag + (vec2(i,j)+0.5)/ssN - 0.5);
    }}
  gl_FragColor = vec4(c/(ssN*ssN), 1.0);
}`;
function compile(type,src){ const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)) throw gl.getShaderInfoLog(s); return s; }
const prog=gl.createProgram();
gl.attachShader(prog,compile(gl.VERTEX_SHADER,VS));
gl.attachShader(prog,compile(gl.FRAGMENT_SHADER,FS));
gl.linkProgram(prog); gl.useProgram(prog);
const quad=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,quad);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 3,-1, -1,3]),gl.STATIC_DRAW);
const locPos=gl.getAttribLocation(prog,'pos');
gl.enableVertexAttribArray(locPos); gl.vertexAttribPointer(locPos,2,gl.FLOAT,false,0,0);
const U={}; ['uRes','F','O','aRe','aIm','mRe','mIm','lnq','ssN'].forEach(n=>U[n]=gl.getUniformLocation(prog,n));
gl.viewport(0,0,N,N);

let tex=null;
function loadSource(imgEl){
  if(!tex) tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,imgEl);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  render(); drawOverlay();
}

// ---- self-similarity rectangle, in normalized [-1,1] coords ----
// rect = the shrunk copy of the whole image: half-size `a` (square in normalized
// coords because it is locked to the source aspect ratio), centered at (RCx,RCy).
let RCx=0, RCy=0, a=1/8;

function rectParams(){
  const q = 1/a;                       // image / copy size ratio
  // fixed point of "scale full image down into the rect" (C0 = origin):
  const Fx = RCx/(1-a), Fy = RCy/(1-a);
  return {q, Fx, Fy};
}

function render(){
  if(!tex) return;
  const doTwist = $('twist').checked;
  const vzoom = parseFloat($('vzoom').value);
  const {q,Fx,Fy} = rectParams();

  // Seamless Droste exponent: alpha = 1 - i*ln(q)/(2*pi).
  const lnq = Math.log(q), twoPi = 2*Math.PI;
  let aRe = 1, aIm = -lnq/twoPi;
  if(!doTwist){ aRe=1; aIm=0; }

  // Output-plane multiply m = exp(t * lnq/alpha), the output self-similarity flow:
  // lnq/alpha scales AND rotates so t -> t+1 reproduces the image exactly. t maps
  // the slider (0..1) to one loop; increasing the slider zooms in.
  const b = lnq/twoPi, denom = 1 + b*b;
  const flowRe = aIm===0 ? lnq : lnq/denom;
  const flowIm = aIm===0 ? 0   : lnq*b/denom;
  const t = (VMAX - vzoom)/(VMAX - VMIN);
  const lmRe = t*flowRe, lmIm = t*flowIm;
  const mMag = Math.exp(lmRe), mRe=mMag*Math.cos(lmIm), mIm=mMag*Math.sin(lmIm);

  // output spiral center O: at F (off) or canvas center (on). Source still folds
  // about F, so the recursion stays correct -- this just reframes the output.
  const Ox = $('centerout').checked ? 0 : Fx;
  const Oy = $('centerout').checked ? 0 : Fy;
  const ss = 3;                         // permanent 3x3 supersampled anti-aliasing

  gl.useProgram(prog);
  gl.uniform2f(U.uRes,N,N); gl.uniform2f(U.F,Fx,Fy); gl.uniform2f(U.O,Ox,Oy);
  gl.uniform1f(U.aRe,aRe); gl.uniform1f(U.aIm,aIm);
  gl.uniform1f(U.mRe,mRe); gl.uniform1f(U.mIm,mIm);
  gl.uniform1f(U.lnq,lnq); gl.uniform1f(U.ssN,ss);
  gl.drawArrays(gl.TRIANGLES,0,3);
  updateLabels(aRe,aIm,q,Fx,Fy);
}

function updateLabels(aRe,aIm,q,Fx,Fy){
  $('vzoomV').textContent = (+$('vzoom').value).toFixed(2);
  $('speedV').textContent = (+$('speed').value).toFixed(2)+'×';
  $('fx').innerHTML =
    'q = image / copy = <code>'+q.toFixed(2)+'</code><br>'+
    'fixed point F = <code>('+Fx.toFixed(2)+', '+Fy.toFixed(2)+')</code><br>'+
    '&alpha; = 1 &minus; i&middot;ln q/2&pi; = <code>'+aRe.toFixed(3)+' '+(aIm<0?'&minus;':'+')+' '+Math.abs(aIm).toFixed(3)+'i</code><br>'+
    'seamless: e<sup>2&pi;i&alpha;</sup> = q.';
}

// ---- overlay: draw the rectangle + corner handles ----
function n2c(nx,ny){ return [ (nx+1)/2*N, (ny+1)/2*N ]; } // normalized->canvas px
function c2n(cx,cy){ return [ cx/N*2-1, cy/N*2-1 ]; }

function rectCornersC(){
  // rect spans [RCx-a, RCx+a] x [RCy-a, RCy+a] in normalized coords
  const [x0,y0]=n2c(RCx-a,RCy-a), [x1,y1]=n2c(RCx+a,RCy+a);
  return {x0,y0,x1,y1};
}

function drawOverlay(){
  ovx.clearRect(0,0,N,N);
  const {x0,y0,x1,y1}=rectCornersC();
  // dim outside
  ovx.fillStyle='rgba(10,12,20,.35)';
  ovx.fillRect(0,0,N,N);
  ovx.clearRect(x0,y0,x1-x0,y1-y0);
  // rect outline
  ovx.strokeStyle='#7aa2f7'; ovx.lineWidth=2;
  ovx.strokeRect(x0,y0,x1-x0,y1-y0);
  // corner handles
  ovx.fillStyle='#7aa2f7';
  for(const [hx,hy] of [[x0,y0],[x1,y0],[x1,y1],[x0,y1]])
    ovx.fillRect(hx-5,hy-5,10,10);
  // fixed-point marker
  const {Fx,Fy}=rectParams(); const [fcx,fcy]=n2c(Fx,Fy);
  ovx.strokeStyle='#f7b97a'; ovx.lineWidth=2;
  ovx.beginPath(); ovx.arc(fcx,fcy,6,0,7); ovx.stroke();
  ovx.beginPath(); ovx.moveTo(fcx-9,fcy); ovx.lineTo(fcx+9,fcy);
  ovx.moveTo(fcx,fcy-9); ovx.lineTo(fcx,fcy+9); ovx.stroke();
}

// ---- interaction ----
// corner i = F + a*(K_i - F), with K_i the matching image corner (+/-1,+/-1).
const KCORNER=[[-1,-1],[1,-1],[1,1],[-1,1]]; // TL,TR,BR,BL (matches drawOverlay order)
let drag=null; // {type:'move'|'corner', idx, F, startN, startRC}
function evN(e){
  const rc=ov.getBoundingClientRect();
  return c2n((e.clientX-rc.left)/rc.width*N, (e.clientY-rc.top)/rc.height*N);
}
function cornerAt(cx,cy){ // canvas px -> corner index or -1
  const {x0,y0,x1,y1}=rectCornersC();
  const corners=[[x0,y0],[x1,y0],[x1,y1],[x0,y1]];
  for(let i=0;i<4;i++)
    if(Math.abs(cx-corners[i][0])<9 && Math.abs(cy-corners[i][1])<9) return i;
  return -1;
}
function cursorFor(cx,cy){
  const ci=cornerAt(cx,cy);
  if(ci>=0) return (ci===0||ci===2)?'nwse-resize':'nesw-resize';
  const [nx,ny]=c2n(cx,cy);
  return (nx>RCx-a&&nx<RCx+a&&ny>RCy-a&&ny<RCy+a)?'grab':'default';
}
ov.addEventListener('pointerdown',e=>{
  ov.setPointerCapture(e.pointerId);
  const rc=ov.getBoundingClientRect();
  const cx=(e.clientX-rc.left)/rc.width*N, cy=(e.clientY-rc.top)/rc.height*N;
  const ci=cornerAt(cx,cy);
  if(ci>=0){
    const {Fx,Fy}=rectParams();            // keep this F fixed while resizing
    drag={type:'corner', idx:ci, F:[Fx,Fy]};
    ov.style.cursor=(ci===0||ci===2)?'nwse-resize':'nesw-resize';
    return;
  }
  const [nx,ny]=c2n(cx,cy);
  if(nx>RCx-a && nx<RCx+a && ny>RCy-a && ny<RCy+a){
    drag={type:'move', startN:[nx,ny], startRC:[RCx,RCy]};
    ov.style.cursor='grabbing';
  }
});
ov.addEventListener('pointermove',e=>{
  if(!drag){
    const rc=ov.getBoundingClientRect();
    ov.style.cursor=cursorFor((e.clientX-rc.left)/rc.width*N,(e.clientY-rc.top)/rc.height*N);
    return;
  }
  const [nx,ny]=evN(e);
  if(drag.type==='move'){
    RCx = drag.startRC[0] + (nx-drag.startN[0]);
    RCy = drag.startRC[1] + (ny-drag.startN[1]);
  } else {
    // scale about the fixed point F: project the mouse onto the ray F -> K_i
    const [Fx,Fy]=drag.F, [Kx,Ky]=KCORNER[drag.idx];
    const dx=Kx-Fx, dy=Ky-Fy;
    let na=((nx-Fx)*dx+(ny-Fy)*dy)/(dx*dx+dy*dy);
    a=Math.max(0.02, Math.min(0.95, na));
    RCx=Fx*(1-a); RCy=Fy*(1-a);            // center that keeps F unchanged
  }
  drawOverlay();
  scheduleRender(1);
});
function endDrag(e){
  if(!drag) return;
  drag=null;
  if(e){ const rc=ov.getBoundingClientRect();
    ov.style.cursor=cursorFor((e.clientX-rc.left)/rc.width*N,(e.clientY-rc.top)/rc.height*N); }
  render(1);
}
ov.addEventListener('pointerup',endDrag);
ov.addEventListener('pointercancel',endDrag);

let raf=0;
function scheduleRender(q){ if(raf) return; raf=requestAnimationFrame(()=>{raf=0; render(q);}); }

$('vzoom').addEventListener('input',()=>render());    // manual framing (can adjust mid-spin)
$('twist').addEventListener('change',()=>render());
$('centerout').addEventListener('change',()=>render());
$('speed').addEventListener('input',()=>{ $('speedV').textContent=(+$('speed').value).toFixed(2)+'×'; });

// ---- seamless infinite zoom: sweep the slider; it spans exactly one loop, so
// wrapping its value mod its range gives endless drift-free zoom. ----
let anim=null;                       // {dir:+1|-1, last}
const R=VMAX-VMIN;
function animFrame(now){
  if(!anim) return;
  const dt=Math.min(0.1,(now-anim.last)/1000); anim.last=now;
  const sp=parseFloat($('speed').value);          // loops per second
  let v=parseFloat($('vzoom').value)+anim.dir*sp*R*dt;
  v=((v-VMIN)%R + R)%R + VMIN;                     // wrap within [VMIN,VMAX)
  $('vzoom').value=v;
  render();
  anim.raf=requestAnimationFrame(animFrame);
}
function startAnim(dir){
  if(anim){ anim.dir=dir; }
  else { anim={dir, last:performance.now(), raf:0}; anim.raf=requestAnimationFrame(animFrame); }
  updateAnimUI();
}
function stopAnim(){ if(anim){ cancelAnimationFrame(anim.raf); anim=null; } updateAnimUI(); }
function updateAnimUI(){
  const d = anim ? anim.dir : 0;
  $('zin').classList.toggle('active', d===+1);
  $('zout').classList.toggle('active', d===-1);
}
// self-toggling buttons: click the active direction to stop, or switch direction
$('zin').addEventListener('click',()=>{ (anim&&anim.dir===+1)?stopAnim():startAnim(+1); });
$('zout').addEventListener('click',()=>{ (anim&&anim.dir===-1)?stopAnim():startAnim(-1); });
$('save').addEventListener('click',()=>{
  const A=document.createElement('a');
  A.download='escher-warp.png'; A.href=out.toDataURL('image/png'); A.click();
});

// Reset only the parameters (rectangle + sliders) — keep the current image.
function resetParams(){
  stopAnim();
  a=1/8; RCx=0; RCy=0; $('vzoom').value=0; $('twist').checked=true;
  drawOverlay(); render(1);
}
$('reset').addEventListener('click',resetParams);

// Load a new source image (upload), then reset params for it.
function loadImage(path, q){
  const im=new Image(); im.crossOrigin='anonymous';
  im.onload=()=>{ a=1/(q||8); RCx=0; RCy=0; $('twist').checked=true;
                  srcImg.src=path; loadSource(im); };
  im.src=path;
}
$('upload').addEventListener('change',e=>{
  const f=e.target.files[0]; if(!f) return;
  stopAnim(); $('vzoom').value=0;
  loadImage(URL.createObjectURL(f), 8);   // url kept alive so the <img> keeps showing it
});

// init — the bundled starter image (corridor) is self-similar by q=8, centered
const STARTER='assets/selfsimilar.png', STARTER_Q=8;
(function init(){
  const p=new URLSearchParams(location.search);
  $('vzoom').value = p.get('vzoom') ?? 0;
  if(p.has('twist')) $('twist').checked = p.get('twist')!=='0';
  if(p.get('center')==='1') $('centerout').checked = true;
  a = 1/parseFloat(p.get('q') ?? STARTER_Q);
  RCx = parseFloat(p.get('rcx') ?? 0); RCy = parseFloat(p.get('rcy') ?? 0);
  srcImg.src=STARTER;
  // start with the zoom animating (in), unless explicitly disabled with ?play=0
  const go=()=>{ loadSource(srcImg); if(p.get('play')!=='0') startAnim(+1); };
  if(srcImg.complete && srcImg.naturalWidth) go();
  else srcImg.onload=go;
})();
</script>
</body>
</html>
